<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tracey's Sentinel - Forensic Evidence Chain of Custody Management">
    <meta name="theme-color" content="#0056CC">
    <title>Tracey's Sentinel — Chain of Custody Management System</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    
    <link rel="stylesheet" href="unified-style.css">
</head>
<body>
    <div class="d-flex" id="app-container" style="min-height: 100vh;">
        <!-- SIDEBAR NAVIGATION -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h5 class="mb-0">
                    <i class="bi bi-shield-check"></i>
                    Tracey's Sentinel
                </h5>
            </div>

            <!-- Navigation Sections -->
            <div class="sidebar-nav">
                <!-- Main Navigation -->
                <div class="nav-section">
                    <h6 class="nav-section-title">Main</h6>
                    <a href="#" class="nav-link active" data-page="dashboard">
                        <i class="bi bi-house-door"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="#" class="nav-link" data-page="cases">
                        <i class="bi bi-folder-check"></i>
                        <span>Cases</span>
                    </a>
                    <a href="#" class="nav-link" data-page="evidence">
                        <i class="bi bi-collection"></i>
                        <span>Evidence</span>
                    </a>
                </div>

                <!-- Operations -->
                <div class="nav-section">
                    <h6 class="nav-section-title">Operations</h6>
                    <a href="#" class="nav-link" data-page="intake">
                        <i class="bi bi-upload"></i>
                        <span>Intake Scanner</span>
                    </a>
                    <a href="#" class="nav-link" data-page="search">
                        <i class="bi bi-search"></i>
                        <span>Advanced Search</span>
                    </a>
                    <a href="#" class="nav-link" data-page="endorsements">
                        <i class="bi bi-check-circle"></i>
                        <span>Endorsements</span>
                    </a>
                </div>

                <!-- Compliance & Audit -->
                <div class="nav-section">
                    <h6 class="nav-section-title">Compliance</h6>
                    <a href="#" class="nav-link" data-page="compliance">
                        <i class="bi bi-clipboard-check"></i>
                        <span>Compliance Status</span>
                    </a>
                    <a href="#" class="nav-link" data-page="audit">
                        <i class="bi bi-shield-lock"></i>
                        <span>Audit Logs</span>
                    </a>
                    <a href="#" class="nav-link" data-page="reports">
                        <i class="bi bi-file-text"></i>
                        <span>Reports</span>
                    </a>
                </div>

                <!-- Analytics & Admin -->
                <div class="nav-section">
                    <h6 class="nav-section-title">Analytics</h6>
                    <a href="#" class="nav-link" data-page="analytics">
                        <i class="bi bi-bar-chart"></i>
                        <span>Analytics</span>
                    </a>
                    <a href="#" class="nav-link" data-page="admin">
                        <i class="bi bi-gear"></i>
                        <span>Admin Panel</span>
                    </a>
                </div>
            </div>

            <!-- Sidebar Footer -->
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">JD</div>
                    <div class="user-info">
                        <div class="user-name" id="sidebar-user-name">John Doe</div>
                        <div class="user-role">Analyst</div>
                    </div>
                </div>
                <button class="btn btn-sm btn-outline-secondary w-100" id="logout-btn">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- TOP BAR -->
            <header class="top-bar">
                <div class="d-flex align-items-center justify-content-between w-100">
                    <div>
                        <h3 class="mb-0" id="page-title">Dashboard</h3>
                        <p class="text-muted small mb-0" id="page-subtitle">Welcome back</p>
                    </div>
                    <div class="d-flex gap-3 align-items-center">
                        <div class="search-box">
                            <i class="bi bi-search"></i>
                            <input type="text" placeholder="Quick search..." id="quick-search">
                        </div>
                        <button class="btn btn-light" id="theme-toggle" title="Toggle theme">
                            <i class="bi bi-moon"></i>
                        </button>
                        <button class="btn btn-light" title="Notifications">
                            <i class="bi bi-bell"></i>
                            <span class="badge bg-danger position-absolute">3</span>
                        </button>
                        <button class="btn btn-light" title="Settings">
                            <i class="bi bi-gear"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- PAGE CONTENT -->
            <div class="content-area">
                <div id="page-container">
                    <!-- Pages will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="app.js"></script>
    <script src="unified-app.js"></script>
</body>
</html>
